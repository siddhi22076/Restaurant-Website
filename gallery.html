<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top right, #2c2f4a 0%, #11121c 60%);
    color:white;
    overflow-x:hidden;
}

/* Decorative Glow Circles */
body::before,
body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
    z-index:-1;
}

body::before{
    top:-150px;
    right:-150px;
}

body::after{
    bottom:-150px;
    left:-150px;
}

/* Section */
.gallery-section{
    padding:80px 20px;
    max-width:1200px;
    margin:auto;
}

.gallery-text{
    max-width:400px;
    margin-bottom:50px;
}

/* ===== NAVBAR ===== */
header{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 8%;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(8px);
z-index:1000;
}

.logo{
font-family:'Playfair Display', serif;
font-size:28px;
color:#d4af37;
letter-spacing:3px;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 40px;
}

.logo img{
width:150px;
height:auto;
}

nav a{
color:white;
text-decoration:none;
margin-left:35px;
font-size:15px;
position:relative;
letter-spacing:1px;
}

nav a.active{
color:#d4af37;
border-bottom:3px solid #d4af37;
}

/* Moving underline */
nav a::after{
content:"";
position:absolute;
left:0;
bottom:-6px;
width:0%;
height:2px;
background:#d4af37;
transition:0.4s ease;
}

nav a:hover::after{
width:100%;
}

nav a:hover{
color:#d4af37;
}

@media(max-width:768px){
nav{
display:none;
}
}
.gallery-text h1{
    margin-top:10px;
    font-family:'Playfair Display', serif;
    font-size:48px;
    letter-spacing:3px;
    margin-bottom:15px;
}

.gallery-text p{
    color:#ccc;
    line-height:1.6;
}

/* Grid Layout */
.gallery-grid{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: 220px;
    gap:20px;
}

/* Collage Sizes */
.item1{
    grid-column: span 2;
    grid-row: span 2;
}

.item2{
    grid-row: span 2;
}

.item4{
    grid-column: span 2;
}

/* Image Styling */
.gallery-grid img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:15px;
    transition:0.5s ease;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* Hover Effect */
.gallery-grid img:hover{
    transform:scale(1.07);
    box-shadow:0 15px 40px rgba(0,0,0,0.8);
}

/* Bottom Social Section */
.social-section{
    text-align:center;
    margin-top:60px;
}

.social-images{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:20px;
}

.social-images img{
    width:90px;
    height:90px;
    object-fit:cover;
    border-radius:10px;
    transition:0.4s;
}

.social-images img:hover{
    transform:scale(1.1);
}

.follow-btn{
    display:inline-block;
    padding:10px 25px;
    border:1px solid white;
    color:white;
    text-decoration:none;
    letter-spacing:2px;
    transition:0.4s;
}

.follow-btn:hover{
    background:white;
    color:black;
}

/* Responsive */
@media(max-width:900px){
    .gallery-grid{
        grid-template-columns: repeat(2, 1fr);
    }
}

@media(max-width:500px){
    .gallery-grid{
        grid-template-columns: 1fr;
    }
}

</style>
</head>

<section class="gallery-section">

    <div class="gallery-text">

    </div>
