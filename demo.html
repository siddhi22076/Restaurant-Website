<!DOCTYPE html>
<html>
<head>
    <title>Aroma Restaurant</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            background:black;
        }

        

        /* Hero Section */
        .hero{
            height:100vh;
            background:
            linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
            url('https://images.unsplash.com/photo-1414235077428-338989a2e8c0') no-repeat center center/cover;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            color:white;
        }

        .hero h1{
            font-family:'Playfair Display', serif;
            font-size:60px;
        }

        .highlight{
            color:#f5b041;
        }

        .hero p{
            margin-top:15px;
            font-size:18px;
        }

        /* Button */
        .btn{
            margin-top:30px;
            display:inline-block;
            padding:12px 30px;
            background:linear-gradient(to right,#f5b041,#d68910);
            color:white;
            text-decoration:none;
            font-weight:600;
            border-radius:5px;
            transition:0.3s;
        }

        .btn:hover{
            background:#b9770e;
        }
/* ===== NAVBAR ===== */
header{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 8%;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(8px);
z-index:1000;
}

.logo{
font-family:'Playfair Display', serif;
font-size:28px;
color:#d4af37;
letter-spacing:3px;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 40px;
}

.logo img{
width:150px;
height:auto;
}

nav a{
color:white;
text-decoration:none;
margin-left:35px;
font-size:15px;
position:relative;
letter-spacing:1px;
}

nav a.active{
color:#d4af37;
border-bottom:3px solid #d4af37;
}


/* Moving underline */
nav a::after{
content:"";
position:absolute;
left:0;
bottom:-6px;
width:0%;
height:2px;
background:#d4af37;
transition:0.4s ease;
}

nav a:hover::after{
width:100%;
}

nav a:hover{
color:#d4af37;
}

    </style>
</head>

<body>
   
 
    <!-- Hero Section -->
    <section class="hero">
        <div>
            <h1>Welcome to <br> <span class="highlight">Aroma Restaurant</span></h1>
            <p>Exquisite Dining Experience</p>
            <a href="menu.html" class="btn">View Menu</a>
        </div>
    </section>

    <!-- JavaScript for Moving Underline -->
    <script>
        const links = document.querySelectorAll("nav ul li a");

        links.forEach(link => {
            link.addEventListener("click", function(){
                links.forEach(l => l.classList.remove("active"));
                this.classList.add("active");
            });
        });
    </script>

<!-- NAVBAR -->
<header>
<div class="logo">
	<img src="logo.jpeg" alt="Aroma Restaurant"></div>
<nav>
<a href="demo.html" class="active">Home</a>
<a href="menu.html">Menu</a>
<a href="gallery.html">Gallery</a>
<a href="location.html">Location</a>
<a href="about_us.html">About us</a>
<a href="contact_us.html">Contact</a>
</nav>
</header>


</body>
</html>
