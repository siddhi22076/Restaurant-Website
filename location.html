<!DOCTYPE html>
<html>
<head>
<title>Aroma</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}

body{
background: radial-gradient(circle at top right, #2c2f4a 0%, #11121c 60%);
color:white
}

.map-section{
    width: 100%;
    min-height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 120px 0;
}

.map-container{
    width: 80%;
    max-width: 1100px;
    margin-top:2px;
    margin-bottom:2px;
    border-radius: 25px;
    overflow: hidden;
    border: 2px solid #d4af37;   /* Gold border */
    box-shadow: 
        0 0 50px rgba(212,175,55,0.8),   /* close gold glow */
        0 0 100px rgba(212,175,55,0.7);     /* medium depth shadow */
	0 0 260px rgba(212,175,55,0.6),   /* Outer gold glow */
        0 25px 60px rgba(0,0,0,0.8);     /* depth depth shadow */
    transition: 0.4s ease;
}

.map-container h1{
            margin-top:10px;
	    margin-bottom:10px;
            font-size:42px;
	    text-align:center;
	    color:#d4af37;
            letter-spacing:2px;
            font-family:'Playfair Display', serif;
        }

.map-container:hover{
    box-shadow: 
        0 0 40px rgba(212,175,55,0.8),
        0 25px 60px rgba(0,0,0,0.7);
    transform: scale(1.02);
}

.map-container iframe{
    width: 100%;
    height: 510px;
    border: 0;
    display: block;
    filter:brightness(110%);
contrast(105%);
}

/* ===== NAVBAR ===== */
header{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 8%;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(8px);
z-index:1000;
}

.logo{
font-family:'Playfair Display', serif;
font-size:28px;
color:#d4af37;
letter-spacing:3px;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 40px;
}

.logo img{
width:150px;
height:auto;
}

nav a{
color:white;
text-decoration:none;
margin-left:35px;
font-size:15px;
position:relative;
letter-spacing:1px;
}

nav a.active{
color:#d4af37;
border-bottom:3px solid #d4af37;
}

/* Moving underline */
nav a::after{
content:"";
position:absolute;
left:0;
bottom:-6px;
width:0%;
height:2px;
background:#d4af37;
transition:0.4s ease;
}

nav a:hover::after{
width:100%;
}

nav a:hover{
color:#d4af37;
}

@media(max-width:768px){
nav{
display:none;
}
}
</style>
</head>

<body>

<!-- MAP BACKGROUND -->
<section class="map-section">
<div class="map-container">
<h1>Find Us </h1>
<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d237.64240246967734!2d75.9046906041569!3d17.636966678874675!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc5da0357e0ce39%3A0x7ab655a1a4f4b390!2s!5e0!3m2!1sen!2sin!4v1771774038781!5m2!1sen!2sin" width="600" height="400" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
</div>
</section>

<!-- NAVBAR -->
<header>
<div class="logo">
	<img src="logo.jpeg" alt="Aroma Restaurant"></div>
<nav>
<a href="demo.html">Home</a>
<a href="menu.html">Menu</a>
<a href="gallery.html">Gallery</a>
<a href="location.html" class="active">Location</a>
<a href="about_us.html">About us</a>
<a href="contact_us.html">Contact us</a>
</nav>
</header>

</body>
</html>
